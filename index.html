<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marc Collins</title>
  <meta name="description" content="Marc Collins — Software engineer, PowerShell developer, and open-source contributor.">
  <meta name="author" content="Marc Collins">
  <link rel="canonical" href="https://nillth.net">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0b0d0f;
      --bg-card:   #13161a;
      --bg-hover:  #1a1e24;
      --border:    #1e2228;
      --text:      #c9cdd3;
      --text-dim:  #6b7280;
      --heading:   #f0f2f4;
      --accent:    #34d399;
      --accent-dim:#065f46;
      --radius:    12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; transition: color .2s; }
    a:hover { color: #6ee7b7; }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Ambient glow ── */
    .glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(52,211,153,.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header / Hero ── */
    header {
      position: relative;
      z-index: 1;
      padding: 100px 0 60px;
      text-align: center;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--border);
      margin-bottom: 28px;
      transition: border-color .3s, transform .3s;
    }
    .avatar:hover { border-color: var(--accent); transform: scale(1.05); }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--text-dim);
      max-width: 480px;
      margin: 0 auto 32px;
    }

    /* ── Social Links ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      font-size: .875rem;
      font-weight: 500;
      transition: all .25s;
    }
    .social-link:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--heading);
      transform: translateY(-2px);
    }
    .social-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Sections ── */
    section {
      position: relative;
      z-index: 1;
      padding: 48px 0;
    }

    .section-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--accent);
      margin-bottom: 24px;
    }

    /* ── Project Cards ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all .25s;
      display: flex;
      flex-direction: column;
    }
    .project-card:hover {
      background: var(--bg-hover);
      border-color: #2a3040;
      transform: translateY(-3px);
    }

    .project-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .project-card h3 svg {
      width: 18px;
      height: 18px;
      fill: var(--text-dim);
      flex-shrink: 0;
    }

    .project-card p {
      font-size: .875rem;
      color: var(--text-dim);
      flex: 1;
      margin-bottom: 16px;
    }

    .project-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: .8rem;
      color: var(--text-dim);
    }

    .lang-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .project-org {
      font-size: .75rem;
      color: var(--text-dim);
      opacity: .7;
      margin-bottom: 4px;
    }

    .project-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .meta-icon {
      width: 14px;
      height: 14px;
      fill: var(--text-dim);
      vertical-align: middle;
    }

    /* ── Loading skeleton ── */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      min-height: 160px;
    }
    .skeleton-line {
      height: 14px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--border) 25%, #252a32 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line + .skeleton-line { margin-top: 12px; }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.shorter { width: 40%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .projects-error {
      text-align: center;
      color: var(--text-dim);
      padding: 32px;
      font-size: .9rem;
    }

    /* ── Stats Section ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      transition: all .25s;
    }
    .stat-card:hover { border-color: #2a3040; }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--heading);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: .75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* ── Language bar ── */
    .lang-section h3 {
      font-size: .875rem;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 12px;
    }

    .lang-bar {
      display: flex;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--border);
    }
    .lang-bar span { transition: width .6s ease; }

    .lang-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      list-style: none;
    }
    .lang-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      color: var(--text);
    }
    .lang-list .pct {
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      padding: 40px 0;
      text-align: center;
      font-size: .8rem;
      color: var(--text-dim);
    }

    footer .pgp {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: .75rem;
      color: var(--text-dim);
      transition: border-color .2s;
    }
    footer .pgp:hover { border-color: var(--accent); }
    footer .pgp svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 60px 0 40px; }
      h1 { font-size: 1.8rem; }
      .tagline { font-size: 1rem; }
      .socials { gap: 8px; }
      .social-link { padding: 8px 14px; font-size: .8rem; }
      section { padding: 32px 0; }
      .projects-grid { grid-template-columns: 1fr; }
    }

    /* ── Fade-in animation ── */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .6s ease forwards;
    }
    .fade-in:nth-child(2) { animation-delay: .1s; }
    .fade-in:nth-child(3) { animation-delay: .2s; }
    .fade-in:nth-child(4) { animation-delay: .3s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Animate sections on scroll ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

  <script>
    /* ── Scroll reveal ── */
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.15 }
    );
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    /* ── Language colors (GitHub's official palette) ── */
    const langColors = {
      PowerShell: '#012456', Python: '#3572A5', JavaScript: '#f1e05a',
      TypeScript: '#3178c6', 'C#': '#178600', Go: '#00ADD8',
      Rust: '#dea584', Shell: '#89e051', HTML: '#e34c26',
      CSS: '#563d7c', Java: '#b07219', Ruby: '#701516',
      PHP: '#4F5D95', Dockerfile: '#384d54', HCL: '#844fba',
    };

    /* ── SVG icon templates ── */
    const repoIcon = '<svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" style="flex-shrink:0"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 010-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5zm10.5-1h-8a1 1 0 00-1 1v6.708A2.486 2.486 0 014.5 9h8zM5 12.25a.25.25 0 01.25-.25h3.5a.25.25 0 01.25.25v3.25a.25.25 0 01-.4.2l-1.45-1.087a.25.25 0 00-.3 0L5.4 15.7a.25.25 0 01-.4-.2z"/></svg>';
    const starIcon = '<svg class="meta-icon" viewBox="0 0 16 16"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>';
    const forkIcon = '<svg class="meta-icon" viewBox="0 0 16 16"><path d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"/></svg>';

    /* ── Build a project card ── */
    function renderCard(repo) {
      const color = langColors[repo.language] || '#6b7280';
      return `<a class="project-card" href="${repo.html_url}" target="_blank" rel="noopener">
        <h3>${repoIcon} ${repo.name}</h3>
        <p>${repo.description || 'No description provided.'}</p>
        <div class="project-meta">
          ${repo.language ? `<span><span class="lang-dot" style="background:${color}"></span>${repo.language}</span>` : ''}
          ${repo.stargazers_count ? `<span>${starIcon} ${repo.stargazers_count}</span>` : ''}
          ${repo.forks_count ? `<span>${forkIcon} ${repo.forks_count}</span>` : ''}
        </div>
      </a>`;
    }

    /* ── Render stats cards ── */
    function renderStats(user, repos) {
      const totalStars = repos.reduce((s, r) => s + r.stargazers_count, 0);
      const totalForks = repos.reduce((s, r) => s + r.forks_count, 0);
      const data = [
        { n: user.public_repos, l: 'Repos' },
        { n: totalStars,        l: 'Stars' },
        { n: totalForks,        l: 'Forks' },
        { n: user.followers,    l: 'Followers' },
      ];
      document.getElementById('stats-grid').innerHTML = data.map(d =>
        `<div class="stat-card"><div class="stat-number">${d.n}</div><div class="stat-label">${d.l}</div></div>`
      ).join('');
    }

    /* ── Render language breakdown bar ── */
    function renderLanguages(repos) {
      const counts = {};
      for (const r of repos) {
        if (r.language) counts[r.language] = (counts[r.language] || 0) + r.size;
      }
      const total = Object.values(counts).reduce((a, b) => a + b, 0);
      if (!total) return;

      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const bar = sorted.map(([lang, bytes]) => {
        const pct = ((bytes / total) * 100).toFixed(1);
        const color = langColors[lang] || '#6b7280';
        return `<span style="width:${pct}%;background:${color}" title="${lang} ${pct}%"></span>`;
      }).join('');

      const list = sorted.map(([lang, bytes]) => {
        const pct = ((bytes / total) * 100).toFixed(1);
        const color = langColors[lang] || '#6b7280';
        return `<li><span class="lang-dot" style="background:${color}"></span>${lang} <span class="pct">${pct}%</span></li>`;
      }).join('');

      document.getElementById('lang-section').innerHTML =
        `<h3>Languages</h3><div class="lang-bar">${bar}</div><ul class="lang-list">${list}</ul>`;
    }

    /* ── Fetch everything and render ── */
    async function loadGitHub() {
      const grid = document.getElementById('projects-grid');
      try {
        const [userRes, reposRes] = await Promise.all([
          fetch('https://api.github.com/users/Nillth'),
          fetch('https://api.github.com/users/Nillth/repos?per_page=100&type=public'),
        ]);
        if (!userRes.ok || !reposRes.ok) throw new Error('API error');
        const user  = await userRes.json();
        const repos = await reposRes.json();

        const owned = repos.filter(r => !r.fork && !r.archived);
        const sorted = owned.sort((a, b) => b.stargazers_count - a.stargazers_count);

        grid.innerHTML = sorted.map(renderCard).join('');
        renderStats(user, owned);
        renderLanguages(owned);
      } catch (err) {
        grid.innerHTML = `<p class="projects-error">
          Could not load projects from GitHub.<br>
          <a href="https://github.com/Nillth?tab=repositories">View repositories on GitHub &rarr;</a>
        </p>`;
      }
    }

    loadGitHub();
  </script>

</body>
</html>
